# docker-compose.yml
services:
  db:
    build: ./db
    command: --bind-address=0.0.0.0        # original cnf binds the wg address; see docs
    environment:
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 10

  app2:
    build: ./app2

  app1:
    build: ./app1
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DB}
      WEATHER_HOST: app2
    depends_on:
      db: { condition: service_healthy }
      app2: { condition: service_started }
    ports:
      - "5000:5000"
